<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #525659;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #toolbar {
            background: #3c3f41;
            color: white;
            padding: 8px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #555;
        }

        #toolbar button {
            background: #5a5e62;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        #toolbar button:hover {
            background: #6c757d;
        }

        #toolbar .page-info {
            background: #2c3e50;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        #toolbar input {
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #2c3e50;
            color: white;
            width: 60px;
            text-align: center;
        }

        #viewerContainer {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: auto;
            padding: 20px;
            background: #525659;
        }

        .page-container {
            position: relative;
            margin: 0 auto 20px auto;
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 50px;
            font-size: 16px;
        }
    </style>
    <!-- PDF.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let currentScale = 1.2;
        let rendering = false;

        // Load PDF function
        function loadPDF(url) {
            showLoading(true);

            pdfjsLib.getDocument(url).promise.then(function(pdf) {
                pdfDoc = pdf;
                totalPages = pdf.numPages;
                document.getElementById('totalPages').textContent = totalPages;
                document.getElementById('currentPage').textContent = currentPage;
                document.getElementById('pageInput').value = currentPage;
                renderPage(currentPage);
                showLoading(false);
            }).catch(function(error) {
                console.error('Error loading PDF:', error);
                showError('Failed to load PDF: ' + error.message);
                showLoading(false);
            });
        }

        // Render a specific page
        function renderPage(pageNum) {
            if (!pdfDoc || rendering) return;

            rendering = true;
            showLoading(true);

            pdfDoc.getPage(pageNum).then(function(page) {
                const viewport = page.getViewport({ scale: currentScale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };

                page.render(renderContext).promise.then(function() {
                    const container = document.getElementById('viewerContainer');
                    container.innerHTML = '';
                    const pageContainer = document.createElement('div');
                    pageContainer.className = 'page-container';
                    pageContainer.style.width = viewport.width + 'px';
                    pageContainer.appendChild(canvas);
                    container.appendChild(pageContainer);
                    rendering = false;
                    showLoading(false);
                }).catch(function(error) {
                    console.error('Render error:', error);
                    rendering = false;
                    showLoading(false);
                });
            }).catch(function(error) {
                console.error('Page error:', error);
                rendering = false;
                showLoading(false);
            });
        }

        // Navigation functions
        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                renderPage(currentPage);
                updatePageInfo();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
                updatePageInfo();
            }
        }

        function goToPage() {
            const page = parseInt(document.getElementById('pageInput').value);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderPage(currentPage);
                updatePageInfo();
            }
        }

        function zoomIn() {
            currentScale += 0.2;
            renderPage(currentPage);
        }

        function zoomOut() {
            if (currentScale > 0.6) {
                currentScale -= 0.2;
                renderPage(currentPage);
            }
        }

        function resetZoom() {
            currentScale = 1.2;
            renderPage(currentPage);
        }

        function updatePageInfo() {
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('pageInput').value = currentPage;
        }

        function showLoading(show) {
            const loader = document.getElementById('loadingIndicator');
            if (loader) {
                loader.style.display = show ? 'block' : 'none';
            }
        }

        function showError(message) {
            const container = document.getElementById('viewerContainer');
            container.innerHTML = '<div class="error">❌ ' + message + '</div>';
        }

        // Java integration methods
        window.loadPDFFromJava = function(url) {
            console.log('Loading PDF from URL:', url);
            loadPDF(url);
        };

        window.getTotalPages = function() {
            return totalPages;
        };

        window.getCurrentPage = function() {
            return currentPage;
        };

        // Initialize event listeners
        window.onload = function() {
            document.getElementById('prevBtn')?.addEventListener('click', prevPage);
            document.getElementById('nextBtn')?.addEventListener('click', nextPage);
            document.getElementById('goToBtn')?.addEventListener('click', goToPage);
            document.getElementById('zoomInBtn')?.addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn')?.addEventListener('click', zoomOut);
            document.getElementById('resetZoomBtn')?.addEventListener('click', resetZoom);
            document.getElementById('pageInput')?.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') goToPage();
            });
        };
    </script>
</head>
<body>
<div id="toolbar">
    <button id="prevBtn" title="Previous Page">◀ Previous</button>
    <span class="page-info">Page <span id="currentPage">1</span> of <span id="totalPages">0</span></span>
    <button id="nextBtn" title="Next Page">Next ▶</button>
    <input type="number" id="pageInput" min="1" value="1" style="width: 60px;">
    <button id="goToBtn">Go</button>
    <div style="flex:1"></div>
    <button id="zoomOutBtn" title="Zoom Out">🔍−</button>
    <button id="zoomInBtn" title="Zoom In">🔍+</button>
    <button id="resetZoomBtn" title="Reset Zoom">100%</button>
</div>
<div id="viewerContainer">
    <div class="loading" id="loadingIndicator">📄 Loading PDF...</div>
</div>
</body>
</html>
